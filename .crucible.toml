[crucible]
version = "1"

[gate]
enabled = false
untangle_bin = "untangle"

[context]
reference_max_depth = 2
reference_max_files = 30
history_max_commits = 20
history_max_days = 30
docs_patterns = [
    "docs/**/*.md",
    "README.md",
    "ARCHITECTURE.md",
]
docs_max_bytes = 50000

[coordinator]
max_rounds = 1
quorum_threshold = 0.75
agent_timeout_secs = 90
devil_advocate = false
max_diff_lines_per_chunk = 1200
max_diff_chunks = 6
enable_structurizer = true

[verdict]
block_on = "Critical"

[rate_limits]
anthropic_rpm = 50
google_rpm = 60
openai_rpm = 60

[prechecks]
enabled = true
include_untangle = true
include_linters = true
include_type_checks = true
include_tests = true
timeout_secs = 30

[task_packs]
paths = []

[plugins]
agents = ["claude-code"]
judge = "claude-code"
analyzer = "claude-code"
paths = []

[plugins.claude-code]
command = "claude"
args = [
    "-p",
    "--output-format",
    "json",
    "--model",
    "claude-haiku-4-5-20251001",
]
persona = "Security Auditor"
role_weight = 2.0

[plugins.codex]
command = "codex"
args = [
    "exec",
    "-",
    "--color",
    "never",
]
persona = "Architecture Lead"
role_weight = 1.5

[plugins.gemini]
command = "gemini"
args = [
    "-y",
    "-o",
    "json",
]
persona = "Performance Optimizer"
role_weight = 1.5

[plugins.open-code]
command = "opencode"
args = []
persona = "Correctness Reviewer"
role_weight = 1.0
