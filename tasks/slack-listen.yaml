id: slack-listen-feature
name: Add factory slack-listen command
worker: ares

repo:
  url: git@github.com:silverpond/silverforge.git
  path: ~/factory/projects/silverforge
  branch: main

eval:
  commands: []
  working_dir: ~/factory/projects/silverforge
  timeout: 120

slack:
  reviewers:
    - U0ALFSY45E0

coder:
  prompt: |
    Add a new CLI command "factory slack-listen" in factory/cli.py that allows
    starting factory runs from Slack.

    When a user posts a message starting with "run:" in the factory Slack channel
    configured for the worker (the same channel already used for run updates), the
    command should:
    1. Parse the task description and --repo flag from the message
       e.g. "run: fix the login bug --repo silverpond/highlighter"
    2. Call launch_task() and spawn_watcher() from factory/runner.py
    3. Reply in the Slack thread with the run ID and that the run has started

    Use Socket Mode (SLACK_APP_TOKEN) to connect. Look up the channel using the
    existing find_or_create_channel() logic in factory/slack.py — use the same
    channel that runs already post updates to.

    Do not change slack-bridge-daemon.py — it already handles routing thread
    replies to tmux sessions on ares.
  model: sonnet
  effort: medium
  agents:
    - claude

crucible:
  rounds: 2
  model: claude-haiku-4-5-20251001
